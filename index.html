<script type="module">
  // ===== Firebase Multi-Device Sync =====
  // WICHTIG: Trage hier deine eigenen Firebase-Projektdaten ein (siehe Anleitung).
  // Ohne gültige Werte funktioniert nur "Single Device" – der Rest der App bleibt unberührt.
  const firebaseConfig = {
    apiKey: "AIzaSyDbE7VCpdQGogjpTPg4jFx5wTtNnvZM1TU",
    authDomain: "archery-arena.firebaseapp.com",
    databaseURL: "https://archery-arena-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "archery-arena",
    storageBucket: "archery-arena.firebasestorage.app",
    messagingSenderId: "324645093897",
    appId: "1:324645093897:web:106c0b548e20323dcc6ed8"
  };

  let fbApp = null, fbDb = null, fbUnsubscribe = null;

  async function fbInit() {
    if (fbApp) return true;
    if (firebaseConfig.apiKey.startsWith('TODO_')) return false;
    try {
      const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
      const { getDatabase } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
      fbApp = initializeApp(firebaseConfig);
      fbDb = getDatabase(fbApp);
      return true;
    } catch (e) {
      console.error('Firebase init failed', e);
      return false;
    }
  }

  window.fbPushState = async function (code, stateObj) {
    const ok = await fbInit();
    if (!ok) return;
    const { getDatabase, ref, set } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    try {
      await set(ref(fbDb, 'sessions/' + code), stateObj);
    } catch (e) {
      console.error('Firebase write error', e);
    }
  };

  window.fbJoinSession = async function (code, onData) {
    const ok = await fbInit();
    if (!ok) { onData(null, 'no-config'); return; }
    const { ref, onValue, off } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    if (fbUnsubscribe) fbUnsubscribe();
    const sessionRef = ref(fbDb, 'sessions/' + code);
    const listener = onValue(sessionRef, (snapshot) => {
      onData(snapshot.val(), null);
    });
    fbUnsubscribe = () => off(sessionRef, 'value', listener);
  };

  window.fbFetchOnce = async function (code) {
    const ok = await fbInit();
    if (!ok) return null;
    const { ref, get } = await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
    try {
      const snap = await get(ref(fbDb, 'sessions/' + code));
      return snap.exists() ? snap.val() : null;
    } catch (e) {
      console.error('Firebase fetch error', e);
      return null;
    }
  };

  window.fbLeaveSession = function () {
    if (fbUnsubscribe) { fbUnsubscribe(); fbUnsubscribe = null; }
  };

  window.fbConfigured = !firebaseConfig.apiKey.startsWith('TODO_');
</script>

<script>
/* ---------- Player color palette (up to 8) ---------- */
const PLAYER_COLORS = [
  { name: 'player1', light: 'player1light' },
  { name: 'player2', light: 'player2light' },
  { name: 'player3', light: 'player3light' },
  { name: 'player4', light: 'player4light' },
  { name: 'player5', light: 'player5light' },
  { name: 'player6', light: 'player6light' },
  { name: 'player7', light: 'player7light' },
  { name: 'player8', light: 'player8light' },
];
const MIN_PLAYERS = 1;
const MAX_PLAYERS = 8;
const PHONE_KEYPAD_ORDER = [1, 2, 3, 4, 5, 6, 7, 8, 9, 0, 10];

/* ---------- Tannenbaum (Spiel 1) config ---------- */
const ROWS = [
  { value: 10, count: 1 },
  { value: 9, count: 1 },
  { value: 8, count: 2 },
  { value: 7, count: 3 },
  { value: 6, count: 4 },
  { value: 5, count: 5 },
  { value: 4, count: 4 },
  { value: 3, count: 3 },
  { value: 2, count: 2 },
  { value: 1, count: 1 },
];
const TREE_TOTAL = ROWS.reduce((sum, row) => sum + row.count, 0);

function makeTree() {
  return ROWS.map(row => new Array(row.count).fill(false));
}

/* ---------- Punktejagd (Spiel 2) config ---------- */
const MIN_POINTS_ROUNDS = 1;
const MAX_POINTS_ROUNDS = 5;
const MIN_POINTS_ARROWS = 3;
const MAX_POINTS_ARROWS = 9;

function makePointsScores(numPlayers, numArrows, numRounds) {
  return Array.from({ length: numPlayers }, () =>
    Array.from({ length: numRounds }, () => new Array(numArrows).fill(null))
  );
}

/* ---------- Zahlenlotto (Spiel 3) config ---------- */
const MIN_LOTTO_ROUNDS = 1;
const MAX_LOTTO_ROUNDS = 5;
const MIN_LOTTO_ARROWS = 3;
const MAX_LOTTO_ARROWS = 6;

function hitPoints(h) {
  return h === 0 ? 0 : 2 * h - 1;
}

const LOTTO_COLORS = [
  { key: 'weiss', label: 'Weiß', letter: 'W', bg: '#FFFFFF', text: '#2B2A25', border: '#CFCABF' },
  { key: 'schwarz', label: 'Schwarz', letter: 'S', bg: '#111111', text: '#FFFFFF', border: '#111111' },
  { key: 'blau', label: 'Blau', letter: 'B', bg: '#2D6E8E', text: '#FFFFFF', border: '#2D6E8E' },
  { key: 'rot', label: 'Rot', letter: 'R', bg: '#C0392B', text: '#FFFFFF', border: '#C0392B' },
  { key: 'gelb', label: 'Gelb', letter: 'G', bg: '#F0C419', text: '#2B2A25', border: '#F0C419' },
];

const FLAG_EASTER_EGGS = [
  { set: ['blau', 'rot', 'weiss'], flag: '🇫🇷', name: 'Frankreich' },
  { set: ['gelb', 'rot', 'schwarz'], flag: '🇩🇪', name: 'Deutschland' },
  { set: ['rot', 'schwarz', 'weiss'], flag: '🇪🇬', name: 'Ägypten' },
  { set: ['blau', 'gelb'], flag: '🇺🇦', name: 'Ukraine' },
  { set: ['rot', 'weiss'], flag: '🇵🇱', name: 'Polen' },
  { set: ['gelb', 'rot'], flag: '🇪🇸', name: 'Spanien' },
  { set: ['blau', 'weiss'], flag: '🇬🇷', name: 'Griechenland' },
];

function matchFlagEasterEgg(draws) {
  const unique = [...new Set(draws)].sort();
  for (const entry of FLAG_EASTER_EGGS) {
    const s = [...entry.set].sort();
    if (s.length === unique.length && s.every((v, i) => v === unique[i])) return entry;
  }
  return null;
}

function maxRepeatForCount(count) {
  return count <= 4 ? 2 : 3;
}
function isValidColorDraw(draws, maxRepeat) {
  const counts = {};
  draws.forEach(k => { counts[k] = (counts[k] || 0) + 1; });
  return Object.values(counts).every(c => c <= maxRepeat);
}
function drawLottoColors(count) {
  const maxRepeat = maxRepeatForCount(count);
  let draws, attempts = 0;
  do {
    draws = Array.from({ length: count }, () => LOTTO_COLORS[Math.floor(Math.random() * LOTTO_COLORS.length)].key);
    attempts++;
  } while (!isValidColorDraw(draws, maxRepeat) && attempts < 300);
  return draws;
}
function drawLottoCall(variant, count) {
  if (variant === 'club') return drawLottoColors(count);
  return Array.from({ length: count }, () => 1 + Math.floor(Math.random() * 10));
}

function makeLottoState(numPlayers, numRounds) {
  return {
    calls: new Array(numRounds).fill(null),
    scores: Array.from({ length: numPlayers }, () => new Array(numRounds).fill(null)),
  };
}

/* ---------- Nullschuss (Spiel 4) config ---------- */
const NULL_START_OPTIONS = [401, 301, 201];
const MIN_NULL_ARROWS = 1;
const MAX_NULL_ARROWS = 10;

function nextActiveNullPlayer(current) {
  const n = state.numPlayers;
  for (let i = 1; i <= n; i++) {
    const cand = (current + i) % n;
    if (!state.nullFinishOrder.includes(cand) && !isPaused(cand)) return cand;
  }
  return current;
}

function defaultNames(n) {
  return Array.from({ length: n }, (_, i) => `Spieler ${i + 1}`);
}

/* ---------- Dauerhafte Nutzer-Anlage (Vorname, Nachname, Arena-Name) ---------- */
const USER_PROFILES_KEY = 'archeryArenaUserProfiles_v1';

function loadUserProfiles() {
  try {
    const raw = localStorage.getItem(USER_PROFILES_KEY);
    const list = raw ? JSON.parse(raw) : [];
    return Array.isArray(list) ? list : [];
  } catch (e) {
    return [];
  }
}

function saveUserProfiles(list) {
  try { localStorage.setItem(USER_PROFILES_KEY, JSON.stringify(list)); } catch (e) {}
}

/* ---------- Lokale Session-Wiederherstellung: mehrere Sessions (max. 48h) ---------- */
const LOCAL_SESSIONS_KEY = 'archeryArenaSessions_v1';
const SESSION_MAX_AGE_MS = 48 * 60 * 60 * 1000;
const MAX_SAVED_SESSIONS = 12;

function buildSessionLabel() {
  const parts = [];
  if (state.mode && GAME_LABELS[state.mode]) parts.push(GAME_LABELS[state.mode].name);
  if (state.numPlayers) parts.push(`${state.numPlayers} Spieler`);
  return parts.join(' · ') || 'Neue Session';
}

function loadAllLocalSessions() {
  try {
    const raw = localStorage.getItem(LOCAL_SESSIONS_KEY);
    const list = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(list)) return [];
    return list
      .filter(s => Date.now() - s.savedAt <= SESSION_MAX_AGE_MS)
      .sort((a, b) => b.savedAt - a.savedAt);
  } catch (e) {
    return [];
  }
}

function saveLocalSession(code, role) {
  try {
    const list = loadAllLocalSessions();
    const idx = list.findIndex(s => s.code === code);
    const createdAt = idx !== -1 && list[idx].createdAt ? list[idx].createdAt : Date.now();
    const entry = { code, role, savedAt: Date.now(), createdAt, label: buildSessionLabel() };
    if (idx !== -1) list.splice(idx, 1);
    list.unshift(entry);
    localStorage.setItem(LOCAL_SESSIONS_KEY, JSON.stringify(list.slice(0, MAX_SAVED_SESSIONS)));
  } catch (e) {}
}

function removeLocalSession(code) {
  try {
    const list = loadAllLocalSessions().filter(s => s.code !== code);
    localStorage.setItem(LOCAL_SESSIONS_KEY, JSON.stringify(list));
  } catch (e) {}
}

function timeAgoLabel(ts) {
  const diffMin = Math.round((Date.now() - ts) / 60000);
  if (diffMin < 1) return 'gerade eben';
  if (diffMin < 60) return `vor ${diffMin} Min.`;
  const diffH = Math.round(diffMin / 60);
  if (diffH < 24) return `vor ${diffH} Std.`;
  const diffD = Math.round(diffH / 24);
  return `vor ${diffD} Tag${diffD === 1 ? '' : 'en'}`;
}

function formatDateTime(ts) {
  const d = new Date(ts);
  const datePart = d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const timePart = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  return `${datePart}, ${timePart} Uhr`;
}

let sessionOpToken = 0;
let resumingCode = null;

async function resumeAsHost(code) {
  if (resumingCode) return; // schon eine Anfrage aktiv - erst abwarten
  resumingCode = code;
  const myToken = ++sessionOpToken;
  render();

  let data = null;
  if (typeof window.fbFetchOnce === 'function') {
    data = await window.fbFetchOnce(code);
  }

  if (myToken !== sessionOpToken) {
    // eine neuere Anfrage hat diese überholt - Ergebnis verwerfen
    resumingCode = null;
    return;
  }

  if (data && data._lastUpdated && (Date.now() - data._lastUpdated > SESSION_MAX_AGE_MS)) {
    data = null;
  }
  if (data) {
    Object.assign(state, data);
  }
  state.sessionCode = code;
  state.isHost = true;
  state.isSpectator = false;
  state.deviceMode = 'multi';
  if (!data) {
    state.screen = 'player-count';
  }
  saveLocalSession(code, 'host');
  resumingCode = null;
  render();
}

/* ---------- Statistik ---------- */
const STATS_KEY = 'archeryArenaStats_v1';
const GAME_LABELS = {
  tree: { name: 'Tannenbaum', icon: '🎄' },
  points: { name: 'Punktejagd', icon: '🏹' },
  lotto: { name: 'Zahlenlotto', icon: '🎲' },
  null: { name: 'Nullschuss', icon: '🎯' },
};

function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function loadStats() {
  try {
    const raw = localStorage.getItem(STATS_KEY);
    const arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) {
    return [];
  }
}
function pruneStats(stats) {
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 6);
  cutoff.setHours(0, 0, 0, 0);
  return stats.filter(s => new Date(s.date + 'T00:00:00') >= cutoff);
}
function saveStats(stats) {
  const pruned = pruneStats(stats);
  try { localStorage.setItem(STATS_KEY, JSON.stringify(pruned)); } catch (e) {}
  return pruned;
}
function recordGameResult(game, winnerText) {
  let stats = loadStats();
  stats.push({
    date: todayISO(),
    time: new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }),
    game,
    players: state.playerNames.slice(0, state.numPlayers),
    winner: winnerText,
  });
  saveStats(stats);
}
function formatStatsDate(dateStr) {
  const today = todayISO();
  const y = new Date();
  y.setDate(y.getDate() - 1);
  const yestISO = `${y.getFullYear()}-${String(y.getMonth() + 1).padStart(2, '0')}-${String(y.getDate()).padStart(2, '0')}`;
  if (dateStr === today) return 'Heute';
  if (dateStr === yestISO) return 'Gestern';
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('de-DE', { weekday: 'long', day: '2-digit', month: '2-digit' });
}

  pausedPlayers: [],

  // tree game

  // points game

};

function isPaused(p) {
  return state.pausedPlayers.includes(p);
}
function activePlayerIndices() {
  return [...Array(state.numPlayers).keys()].filter(p => !isPaused(p));
}
function pauseButtonHtml(p, variant) {
  const paused = isPaused(p);
  const base = 'text-[11px] px-2 py-1 rounded-lg border font-medium whitespace-nowrap';
  const cls = paused ? `${base} border-gold text-gold bg-gold/10` : `${base} border-ink/15 text-ink/40`;
  return `<button data-action="toggle-pause" data-player="${p}" class="${cls}">${paused ? '▶ Zurück' : '⏸ Pause'}</button>`;
}

function isTreeComplete(tree) {
  return tree.every(row => row.every(cell => cell === true));
}
function totalHits(tree) {
  return tree.reduce((sum, row) => sum + row.filter(Boolean).length, 0);
}
function roundTotal(player, round) {
  return state.pointsScores[player][round].reduce((s, v) => s + (v === null ? 0 : v), 0);
}
function grandTotal(player) {
  let sum = 0;
  for (let r = 0; r < state.numRoundsPoints; r++) sum += roundTotal(player, r);
  return sum;
}
function allPointsFilled() {
  return activePlayerIndices().every(p => state.pointsScores[p].every(round => round.every(v => v !== null)));
}

function lottoRoundPoints(player, round) {
  const hits = state.lottoScores[player][round];
  return hits === null ? 0 : hitPoints(hits);
}
function lottoGrandTotal(player) {
  let sum = 0;
  for (let r = 0; r < state.numRoundsLotto; r++) sum += lottoRoundPoints(player, r);
  return sum;
}
function allLottoFilled() {
  const callsDone = state.lottoCalls.every(c => c !== null);
  const scoresDone = activePlayerIndices().every(p => state.lottoScores[p].every(v => v !== null));
  return callsDone && scoresDone;
}

/* ---------- Stechen (Tiebreak) ---------- */
function computeTotalsMap(game) {
  const map = {};
  for (let p = 0; p < state.numPlayers; p++) {
    map[p] = game === 'points' ? grandTotal(p) : lottoGrandTotal(p);
  }
  return map;
}

function maybeStartTiebreak(game) {
  if (state.tiebreak) return;
  const active = activePlayerIndices();
  if (active.length < 2) return;
  const totals = computeTotalsMap(game);
  const max = Math.max(...active.map(p => totals[p]));
  const tied = active.filter(p => totals[p] === max);
  if (tied.length < 2) return;

  const maxAttempts = game === 'points' ? state.numArrows : state.lottoArrowsPerRound;
  state.tiebreak = {
    game,
    lottoVariant: game === 'lotto' ? state.lottoVariant : null,
    contenders: tied,
    eliminationRounds: [],
    attempt: 0,
    maxAttempts,
    currentCall: null,
    answers: {},
    finished: false,
    resultTiers: null,
  };
  if (game === 'lotto') {
    state.tiebreak.currentCall = state.lottoVariant === 'club' ? drawLottoColors(1)[0] : (1 + Math.floor(Math.random() * 10));
  }
}

function evaluateTiebreakAttempt() {
  const tb = state.tiebreak;
  const answered = tb.contenders.every(p => tb.answers[p] !== undefined);
  if (!answered) return;

  let bestGroup;
  if (tb.game === 'points') {
    const maxVal = Math.max(...tb.contenders.map(p => tb.answers[p]));
    bestGroup = tb.contenders.filter(p => tb.answers[p] === maxVal);
  } else {
    const hits = tb.contenders.filter(p => tb.answers[p] === true);
    bestGroup = hits.length > 0 ? hits : tb.contenders.slice();
  }

  const eliminated = tb.contenders.filter(p => !bestGroup.includes(p));
  if (eliminated.length > 0) tb.eliminationRounds.push(eliminated);
  tb.contenders = bestGroup;
  tb.attempt++;
  tb.answers = {};

  if (tb.contenders.length === 1 || tb.attempt >= tb.maxAttempts) {
    finalizeTiebreak();
  } else if (tb.game === 'lotto') {
    tb.currentCall = tb.lottoVariant === 'club' ? drawLottoColors(1)[0] : (1 + Math.floor(Math.random() * 10));
  }
}

function finalizeTiebreak() {
  const tb = state.tiebreak;
  tb.finished = true;
  const tiers = [tb.contenders.slice()];
  for (let i = tb.eliminationRounds.length - 1; i >= 0; i--) tiers.push(tb.eliminationRounds[i]);
  tb.resultTiers = tiers;

  const flagField = tb.game === 'points' ? 'pointsStatsRecorded' : 'lottoStatsRecorded';
  if (!state[flagField]) {
    const winnerNames = tiers[0].map(p => state.playerNames[p]).join(' & ');
    recordGameResult(tb.game, tiers[0].length > 1 ? winnerNames + ' (geteilt)' : winnerNames);
    state[flagField] = true;
  }
}

function buildFinalRanking(game) {
  const totals = computeTotalsMap(game);
  const active = activePlayerIndices();
  const byTotal = {};
  active.forEach(p => { (byTotal[totals[p]] = byTotal[totals[p]] || []).push(p); });
  const totalKeys = Object.keys(byTotal).map(Number).sort((a, b) => b - a);
  let order = [];
  let tiebreakTierBoundaries = null;
  totalKeys.forEach((t, gi) => {
    let group = byTotal[t];
    if (gi === 0 && group.length > 1 && state.tiebreak && state.tiebreak.finished && state.tiebreak.game === game) {
      const flat = state.tiebreak.resultTiers.flat();
      group = flat.filter(p => group.includes(p));
      tiebreakTierBoundaries = state.tiebreak.resultTiers.map(t2 => t2.length);
    }
    order = order.concat(group);
  });
  return { order, totals, tiebreakTierBoundaries };
}

function assignRanksForFinal(order, totals, tiebreakTierBoundaries) {
  const ranks = {};
  let rank = 1;
  let i = 0;
  if (tiebreakTierBoundaries) {
    tiebreakTierBoundaries.forEach(size => {
      for (let k = 0; k < size; k++) { ranks[order[i]] = rank; i++; }
      rank += size;
    });
  }
  while (i < order.length) {
    const t = totals[order[i]];
    let j = i;
    while (j < order.length && totals[order[j]] === t) { ranks[order[j]] = rank; j++; }
    rank += (j - i);
    i = j;
  }
  return ranks;
}

  const inputs = document.querySelectorAll('[data-player-input]');
  inputs.forEach(inp => {
    const idx = parseInt(inp.dataset.playerInput, 10);
    const val = inp.value.trim();
    if (val) state.playerNames[idx] = val;
  });
}

  const isLotto = state.mode === 'lotto';

          <input type="number" id="num-points-rounds-input" value="${state.numRoundsPoints}" min="${MIN_POINTS_ROUNDS}" max="${MAX_POINTS_ROUNDS}"

        </label>
        <label class="block mb-6">
          <span class="text-sm font-medium text-ink/70 mb-1 block">Pfeile pro Runde (${MIN_POINTS_ARROWS}–${MAX_POINTS_ARROWS})</span>

          <span class="text-sm font-medium text-ink/70 mb-2 block">Spielmodus</span>

            <button data-action="select-lotto-variant" data-value="club"

          <span class="text-sm font-medium text-ink/70 mb-1 block">Anzahl Runden (max. ${MAX_LOTTO_ROUNDS})</span>
          <input type="number" id="num-rounds-input" value="${state.numRoundsLotto}" min="${MIN_LOTTO_ROUNDS}" max="${MAX_LOTTO_ROUNDS}"

        </label>
        <label class="block mb-6">
          <span class="text-sm font-medium text-ink/70 mb-1 block">Pfeile pro Runde (${MIN_LOTTO_ARROWS}–${MAX_LOTTO_ARROWS})</span>

                class="flex-1 h-12 rounded-xl font-display text-base border-2 transition-colors

/* ---------- Ranking (gemeinsam für alle Spiele) ---------- */
function renderRankingBanner(entries, title) {

  return `
    <div class="mt-4 rounded-2xl bg-pine text-parchment px-5 py-4 pop-in">
      <p class="font-display text-xl text-center mb-3">${title || '🏆 Rangliste'}</p>
      <div class="flex flex-col gap-1.5">
        ${entries.map(e => `
          <div class="flex items-center justify-between text-sm gap-3">

      </div>

/* ---------- Tree game ---------- */
function renderTreeGame() {
  const n = state.numPlayers;
  const canUndo = state.history.length > 0;

  return `
    ${state.treeFinishOrder.length ? renderTreeRanking() : ''}
    <div class="sticky top-0 z-10 bg-parchment/95 backdrop-blur pt-4 pb-3 -mx-4 px-4 border-b border-parchment2">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <button data-action="go-home" class="h-9 w-9 rounded-lg border-2 border-ink/15 flex items-center justify-center">🏠</button>
          ${!state.isSpectator ? `<button data-action="switch-game" class="h-9 w-9 rounded-lg border-2 border-ink/15 flex items-center justify-center" title="Zurück zum Spielmenü">🔁</button>` : ''}
          <p class="font-display text-2xl text-pinedark">Tannenbaum</p>
        </div>
        <div class="flex gap-2">
          <button data-action="undo" ${!canUndo ? 'disabled' : ''}
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium flex items-center gap-1 ${!canUndo ? 'opacity-35' : 'active:scale-95'}">
            ↺ Undo
          </button>
          <button data-action="reset"
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium active:scale-95">
            ⟲ Reset
          </button>
        </div>
      </div>
      <div class="flex flex-wrap gap-2">
        ${[...Array(n).keys()].map(p => {
          const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
          const isActive = state.active === p;
          const paused = isPaused(p);
          return `
            <div class="flex items-center gap-1 flex-1 min-w-[130px]">
              <button data-action="select-player" data-player="${p}" ${paused ? 'disabled' : ''}
                class="flex-1 h-12 rounded-xl font-display text-base border-2 flex items-center justify-center gap-1 transition-colors
                  ${paused ? 'opacity-40 bg-parchment2 border-parchment2 text-ink/40' : (isActive ? `bg-${c.name} border-${c.name} text-white` : `bg-${c.light} border-${c.light} text-${c.name}`)}">
                ${isActive && !paused ? '🎯 ' : ''}${escapeHtml(state.playerNames[p])}
              </button>
              ${pauseButtonHtml(p)}
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-5">
      ${[...Array(n).keys()].map(p => renderTreeCard(p)).join('')}
    </div>
  `;
}

function renderTreeRanking() {
  const finished = state.treeFinishOrder;
  const unfinishedActive = activePlayerIndices()
    .filter(p => !finished.includes(p))
    .sort((a, b) => totalHits(state.trees[b]) - totalHits(state.trees[a]));
  const order = [...finished, ...unfinishedActive];
  const entries = order.map((p, i) => ({
    label: state.playerNames[p] + (finished.includes(p) ? '' : ' (im Spiel)'),
    value: `${totalHits(state.trees[p])}/${TREE_TOTAL}`,
    rank: i + 1,
  }));
  return renderRankingBanner(entries);
}

function renderTreeCard(p) {
  const tree = state.trees[p];
  const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
  const isActive = state.active === p && !isPaused(p);
  const complete = isTreeComplete(tree);
  const hits = totalHits(tree);
  const paused = isPaused(p);

  return `
    <div id="tree-card-${p}" class="bg-white rounded-2xl border-2 ${isActive ? `border-${c.name}` : 'border-parchment2'} p-4 ${isActive || paused ? '' : 'tree-dim'} ${paused ? 'opacity-50' : ''}">
      <div class="flex items-center justify-between mb-3">
        <p class="font-display text-lg text-${c.name}">${escapeHtml(state.playerNames[p])}${paused ? ' · pausiert' : ''}</p>
        <p class="text-xs font-medium text-ink/50">${hits} / ${TREE_TOTAL}</p>
      </div>
      <div class="flex flex-col items-center gap-[6px]">
        ${ROWS.map((row, r) => `
          <div class="flex gap-[6px]">
            ${Array.from({ length: row.count }).map((_, col) => {
              const hit = tree[r][col];
              return `
                <button
                  data-action="hit-cell" data-player="${p}" data-row="${r}" data-col="${col}"
                  ${isActive && !complete ? '' : 'disabled'}
                  class="ring-cell border-2 ${hit ? 'hit' : `border-${c.name} bg-${c.light} text-${c.name}`}">
                  <span class="num">${row.value}</span>
                  ${hit ? `<span class="arrow-mark"><svg width="24" height="24" viewBox="0 0 26 26"><line x1="5" y1="5" x2="21" y2="21" stroke="#5F5A4E" stroke-width="2.5" stroke-linecap="round"/><line x1="21" y1="5" x2="5" y2="21" stroke="#5F5A4E" stroke-width="2.5" stroke-linecap="round"/></svg></span>` : ''}
                </button>
              `;
            }).join('')}
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

/* ---------- Points game ---------- */
function renderPointsGame() {
  const n = state.numPlayers;
  const filled = allPointsFilled();
  const canUndo = state.pointsHistory.length > 0;
  let ranking = '';

  if (filled) {
    maybeStartTiebreak('points');
    if (state.tiebreak && state.tiebreak.game === 'points' && !state.tiebreak.finished) {
      ranking = renderTiebreakPanel();
    } else {
      if (!state.pointsStatsRecorded) {
        const active = activePlayerIndices();
        const totals = computeTotalsMap('points');
        const maxTotal = Math.max(...active.map(p => totals[p]));
        const winners = active.filter(p => totals[p] === maxTotal);
        recordGameResult('points', winners.length > 1 ? 'Unentschieden' : state.playerNames[winners[0]]);
        state.pointsStatsRecorded = true;
      }
      const { order, totals, tiebreakTierBoundaries } = buildFinalRanking('points');
      const ranks = assignRanksForFinal(order, totals, tiebreakTierBoundaries);
      const entries = order.map(p => ({ label: state.playerNames[p], value: `${totals[p]} Punkte`, rank: ranks[p] }));
      ranking = renderRankingBanner(entries);
    }
  }

  return `
    ${ranking}
    <div class="sticky top-0 z-10 bg-parchment/95 backdrop-blur pt-4 pb-3 -mx-4 px-4 border-b border-parchment2">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <button data-action="go-home" class="h-9 w-9 rounded-lg border-2 border-ink/15 flex items-center justify-center">🏠</button>
          ${!state.isSpectator ? `<button data-action="switch-game" class="h-9 w-9 rounded-lg border-2 border-ink/15 flex items-center justify-center" title="Zurück zum Spielmenü">🔁</button>` : ''}
          <p class="font-display text-2xl text-pinedark">Punktejagd</p>
        </div>
        <div class="flex gap-2">
          <button data-action="undo-points" ${!canUndo ? 'disabled' : ''}
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium flex items-center gap-1 ${!canUndo ? 'opacity-35' : 'active:scale-95'}">
            ↺ Undo
          </button>
          <button data-action="reset-points"
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium active:scale-95">
            ⟲ Reset
          </button>
        </div>
      </div>
      <div class="flex flex-wrap gap-2">
        ${Array.from({ length: state.numRoundsPoints }).map((_, r) => `
          <button data-action="select-round" data-round="${r}"
            class="flex-1 min-w-[70px] h-11 rounded-xl font-display text-sm border-2 transition-colors
              ${state.pointsRound === r ? 'bg-gold border-gold text-white' : 'bg-white border-parchment2 text-ink/60'}">
            Runde ${r + 1}
          </button>
        `).join('')}
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-5">
      ${[...Array(n).keys()].map(p => renderPointsCard(p)).join('')}
    </div>
    ${renderNumpadOverlay()}
  `;
}

function renderPointsCard(p) {
  const round = state.pointsRound;
  const values = state.pointsScores[p][round];
  const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
  const paused = isPaused(p);

  return `
    <div class="bg-white rounded-2xl border-2 border-${c.name} p-4 ${paused ? 'opacity-50' : ''}">
      <div class="flex items-center justify-between mb-3">
        <p class="font-display text-lg text-${c.name}">${escapeHtml(state.playerNames[p])}${paused ? ' · pausiert' : ''}</p>
        <div class="flex items-center gap-2">
          <p class="text-xs font-medium text-ink/50">Runde ${round + 1}: ${roundTotal(p, round)} Pkt</p>
          ${pauseButtonHtml(p)}
        </div>
      </div>
      <div class="flex flex-wrap gap-2">
        ${values.map((v, idx) => `
          <button data-action="open-picker" data-player="${p}" data-round="${round}" data-idx="${idx}" ${paused ? 'disabled' : ''}
            class="arrow-slot border-2 ${v === null ? `border-${c.name} bg-${c.light} text-${c.name}` : `bg-${c.name} border-${c.name} text-white`}">
            ${v === null ? '–' : v}
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function renderNumpadOverlay() {
  if (!state.picker || state.isSpectator) return '';
  const { player: p, round, idx } = state.picker;
  const c = PLAYER_COLORS[p % PLAYER_COLORS.length];

  return `
    <div data-action="close-picker" class="fixed inset-0 z-50 flex items-end justify-center" style="background:rgba(15,42,31,0.55);">
      <div class="w-full max-w-md bg-white rounded-t-3xl p-5 pb-8 pop-in">
        <div class="w-10 h-1.5 bg-parchment2 rounded-full mx-auto mb-4"></div>
        <p class="text-center text-sm text-ink/60 mb-1">${escapeHtml(state.playerNames[p])} · Runde ${round + 1}</p>
        <p class="text-center font-display text-lg text-${c.name} mb-4">Pfeil ${idx + 1} – Punktzahl wählen</p>
        <div class="grid grid-cols-3 gap-3">
          ${PHONE_KEYPAD_ORDER.map(val => `
            <button data-action="pick-score" data-player="${p}" data-round="${round}" data-idx="${idx}" data-value="${val}"
              class="h-16 rounded-2xl border-2 border-${c.name} bg-${c.light} text-${c.name} font-display text-2xl active:scale-90 transition-transform">
              ${val}
            </button>
          `).join('')}
          <button data-action="close-picker"
            class="h-16 rounded-2xl border-2 border-ink/15 text-ink/50 font-display text-sm active:scale-90 transition-transform">
            Schließen
          </button>
        </div>
      </div>
    </div>
  `;
}

/* ---------- Stechen-Panel (Punktejagd & Zahlenlotto) ---------- */
function renderTiebreakPanel() {
  const tb = state.tiebreak;
  const contenders = tb.contenders;
  const nextPlayer = contenders.find(p => tb.answers[p] === undefined);

  let body = '';
  if (tb.game === 'points') {
    body = `
      <p class="text-sm text-parchment/80 text-center mb-3">Versuch ${tb.attempt + 1} von ${tb.maxAttempts} – höchste Zahl gewinnt</p>
      ${nextPlayer !== undefined ? `
        <p class="text-center font-display text-lg mb-3">${escapeHtml(state.playerNames[nextPlayer])} schießt</p>
        ${state.isSpectator ? `
          <p class="text-xs text-parchment/60 text-center italic">👁 Zuschauer-Ansicht – Eingabe nur auf dem Host-Gerät</p>
        ` : `
          <div class="grid grid-cols-3 gap-2">
            ${PHONE_KEYPAD_ORDER.map(val => `
              <button data-action="tiebreak-answer-points" data-player="${nextPlayer}" data-value="${val}"
                class="h-14 rounded-2xl border-2 border-parchment bg-white/10 text-parchment font-display text-xl active:scale-90 transition-transform">
                ${val}
              </button>
            `).join('')}
          </div>
        `}
      ` : ''}
      <div class="flex flex-wrap gap-2 justify-center mt-4">
        ${contenders.map(p => `<span class="text-xs px-2 py-1 rounded-full ${tb.answers[p] !== undefined ? 'bg-parchment text-pine' : 'border border-parchment/40 text-parchment/70'}">${escapeHtml(state.playerNames[p])}${tb.answers[p] !== undefined ? ': ' + tb.answers[p] : ''}</span>`).join('')}
      </div>
    `;
  } else {
    const call = tb.currentCall;
    const isClub = tb.lottoVariant === 'club';
    let callDisplay;
    if (isClub) {
      const def = LOTTO_COLORS.find(c => c.key === call);
      callDisplay = `<div class="call-ball border-2 mx-auto" style="background:${def.bg};color:${def.text};border-color:${def.border};">${def.letter}</div><p class="text-xs text-parchment/70 mt-1">${def.label}</p>`;
    } else {
      callDisplay = `<div class="call-ball border-2 border-parchment bg-white/10 text-parchment mx-auto">${call}</div>`;
    }
    body = `
      <p class="text-sm text-parchment/80 text-center mb-3">Versuch ${tb.attempt + 1} von ${tb.maxAttempts} – richtige${isClub ? ' Farbe' : ' Zahl'} gewinnt</p>
      <div class="text-center mb-4">${callDisplay}</div>
      <div class="flex flex-col gap-2">
        ${contenders.map(p => `
          <div class="flex items-center justify-between gap-2">
            <span class="text-sm">${escapeHtml(state.playerNames[p])}</span>
            ${tb.answers[p] !== undefined ? `
              <span class="text-xs px-2 py-1 rounded-full bg-parchment text-pine">${tb.answers[p] ? '✅ Getroffen' : '❌ Verfehlt'}</span>
            ` : state.isSpectator ? `
              <span class="text-xs text-parchment/50 italic">wartet...</span>
            ` : `
              <span class="flex gap-2">
                <button data-action="tiebreak-answer-lotto" data-player="${p}" data-hit="1" class="text-xs px-3 py-1.5 rounded-lg border border-parchment text-parchment">✅ Treffer</button>
                <button data-action="tiebreak-answer-lotto" data-player="${p}" data-hit="0" class="text-xs px-3 py-1.5 rounded-lg border border-parchment/50 text-parchment/70">❌ Verfehlt</button>
              </span>
            `}
          </div>
        `).join('')}
      </div>
    `;
  }

  return `
    <div class="mt-4 rounded-2xl bg-pine text-parchment px-5 py-4 pop-in">
      <p class="font-display text-xl text-center mb-1">⚡ Stechen</p>
      <p class="text-xs text-center text-parchment/70 mb-3">Gleichstand um Platz 1: ${tb.contenders.map(p => escapeHtml(state.playerNames[p])).join(', ')}</p>
      ${body}
    </div>
  `;
}

/* ---------- Zahlenlotto game ---------- */
function renderLottoGame() {
  const n = state.numPlayers;
  const filled = allLottoFilled();
  const canUndo = state.lottoHistory.length > 0;
  const round = state.lottoRound;
  const calls = state.lottoCalls[round];
  let ranking = '';

  if (filled) {
    maybeStartTiebreak('lotto');
    if (state.tiebreak && state.tiebreak.game === 'lotto' && !state.tiebreak.finished) {
      ranking = renderTiebreakPanel();
    } else {
      if (!state.lottoStatsRecorded) {
        const active = activePlayerIndices();
        const totals = computeTotalsMap('lotto');
        const maxTotal = Math.max(...active.map(p => totals[p]));
        const winners = active.filter(p => totals[p] === maxTotal);
        recordGameResult('lotto', winners.length > 1 ? 'Unentschieden' : state.playerNames[winners[0]]);
        state.lottoStatsRecorded = true;
      }
      const { order, totals, tiebreakTierBoundaries } = buildFinalRanking('lotto');
      const ranks = assignRanksForFinal(order, totals, tiebreakTierBoundaries);
      const entries = order.map(p => ({ label: state.playerNames[p], value: `${totals[p]} Punkte`, rank: ranks[p] }));
      ranking = renderRankingBanner(entries);
    }
  }

  return `
    ${ranking}
    <div class="sticky top-0 z-10 bg-parchment/95 backdrop-blur pt-4 pb-3 -mx-4 px-4 border-b border-parchment2">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <button data-action="go-home" class="h-9 w-9 rounded-lg border-2 border-ink/15 flex items-center justify-center">🏠</button>
          ${!state.isSpectator ? `<button data-action="switch-game" class="h-9 w-9 rounded-lg border-2 border-ink/15 flex items-center justify-center" title="Zurück zum Spielmenü">🔁</button>` : ''}
          <p class="font-display text-2xl text-pinedark">Zahlenlotto</p>
        </div>
        <div class="flex gap-2">
          <button data-action="undo-lotto" ${!canUndo ? 'disabled' : ''}
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium flex items-center gap-1 ${!canUndo ? 'opacity-35' : 'active:scale-95'}">
            ↺ Undo
          </button>
          <button data-action="reset-lotto"
            class="h-10 px-3 rounded-lg border-2 border-ink/15 text-sm font-medium active:scale-95">
            ⟲ Reset
          </button>
        </div>
      </div>
      <div class="flex flex-wrap gap-2 mb-3">
        ${Array.from({ length: state.numRoundsLotto }).map((_, r) => `
          <button data-action="select-lotto-round" data-round="${r}"
            class="flex-1 min-w-[70px] h-11 rounded-xl font-display text-sm border-2 transition-colors
              ${state.lottoRound === r ? 'bg-gold border-gold text-white' : 'bg-white border-parchment2 text-ink/60'}">
            Runde ${r + 1}
          </button>
        `).join('')}
      </div>
      ${renderLiveStandings('lotto')}
    </div>

    <div class="mt-5">
      ${calls === null ? renderLottoDrawCard(round) : renderLottoRoundContent(round, calls)}
    </div>
  `;
}

function renderLiveStandings(game) {
  const totals = computeTotalsMap(game);
  const active = activePlayerIndices();
  if (active.length === 0) return '';
  const maxTotal = Math.max(...active.map(p => totals[p]));
  const sorted = [...active].sort((a, b) => totals[b] - totals[a]);
  return `
    <div class="flex flex-wrap gap-2 bg-white rounded-xl border border-parchment2 px-3 py-2 mt-3">
      ${sorted.map(p => {
        const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
        const isLeader = totals[p] === maxTotal && maxTotal > 0;
        return `
          <span class="text-sm font-medium ${isLeader ? `text-${c.name}` : 'text-ink/60'}">
            ${escapeHtml(state.playerNames[p])}: <span class="font-display text-base">${totals[p]}</span>${isLeader ? ' 👑' : ''}
          </span>
        `;
      }).join('<span class="text-ink/20">|</span>')}
    </div>
  `;
}

  const isClub = state.lottoVariant === 'club';

      <p class="text-sm text-ink/60 mb-5">Noch ${isClub ? 'keine Farben' : 'keine Zahlen'} ausgelost. Bereit für die ${state.lottoArrowsPerRound} Zielwerte?</p>

function renderNullRanking() {
  const finished = state.nullFinishOrder;
  const unfinishedActive = activePlayerIndices()
    .filter(p => !finished.includes(p))
    .sort((a, b) => state.nullScores[a] - state.nullScores[b]);

  const entries = order.map((p, i) => ({
    label: state.playerNames[p] + (finished.includes(p) ? ` (${state.nullArrowsUsed[p]} Pfeile)` : ' (im Spiel)'),
    value: finished.includes(p) ? '0' : state.nullScores[p],
    rank: i + 1,
  }));
  return renderRankingBanner(entries);
}

function renderNullBoardCard(p) {
  const c = PLAYER_COLORS[p % PLAYER_COLORS.length];
  const finishedIdx = state.nullFinishOrder.indexOf(p);

  const paused = isPaused(p);
  const isActive = state.nullActive === p && !isFinished && !paused;
  const medals = ['🏆', '🥈', '🥉'];
  const medal = isFinished ? (medals[finishedIdx] || `${finishedIdx + 1}.`) : '';
  return `
    <div class="bg-white rounded-2xl border-2 ${isActive || isFinished ? `border-${c.name}` : 'border-parchment2'} p-4 ${isActive || isFinished || paused ? '' : 'tree-dim'} ${paused ? 'opacity-50' : ''}">

/* ---------- Statistik ---------- */
function renderStats() {
  const stats = pruneStats(loadStats());
  const byDate = {};
  stats.forEach(s => { (byDate[s.date] = byDate[s.date] || []).push(s); });
  const dates = Object.keys(byDate).sort((a, b) => b.localeCompare(a));

  const summary = {};
  Object.keys(GAME_LABELS).forEach(g => { summary[g] = { count: 0, wins: {} }; });
  stats.forEach(s => {
    summary[s.game].count++;
    if (s.winner && s.winner !== 'Unentschieden') {
      s.winner.split(' & ').forEach(name => {
        summary[s.game].wins[name] = (summary[s.game].wins[name] || 0) + 1;
      });
    }
  });

  return `
    <div class="pt-10 pb-6">
      <button data-action="back-to-mode-from-stats" class="text-sm text-ink/50 mb-4">← Zurück</button>
      <p class="font-display text-gold text-sm tracking-[0.3em] uppercase mb-1 text-center">Letzte 7 Tage</p>
      <h1 class="font-display text-4xl text-pinedark text-center">📊 Statistik</h1>
    </div>

    <div class="grid grid-cols-2 gap-3 mb-6">
      ${Object.keys(GAME_LABELS).map(g => {
        const s = summary[g];
        const topName = Object.keys(s.wins).sort((a, b) => s.wins[b] - s.wins[a])[0];
        return `
          <div class="bg-white rounded-2xl border border-parchment2 p-4">
            <p class="font-display text-base text-pinedark mb-1">${GAME_LABELS[g].icon} ${GAME_LABELS[g].name}</p>
            <p class="text-xs text-ink/50">${s.count} Spiel${s.count === 1 ? '' : 'e'}</p>
            ${topName ? `<p class="text-xs text-gold mt-1">👑 ${escapeHtml(topName)} (${s.wins[topName]}×)</p>` : ''}
          </div>
        `;
      }).join('')}
    </div>

    ${dates.length === 0 ? `
      <p class="text-center text-sm text-ink/50 mt-10">Noch keine gespeicherten Spiele in den letzten 7 Tagen.</p>
    ` : dates.map(date => `
      <div class="mb-5">
        <p class="font-display text-sm text-ink/50 uppercase tracking-widest mb-2">${formatStatsDate(date)}</p>
        <div class="flex flex-col gap-2">
          ${byDate[date].map(entry => `
            <div class="bg-white rounded-xl border border-parchment2 px-4 py-3 flex items-center justify-between gap-3">
              <div class="min-w-0">
                <p class="text-sm font-medium">${GAME_LABELS[entry.game].icon} ${GAME_LABELS[entry.game].name}</p>
                <p class="text-xs text-ink/50 truncate">${entry.players.map(escapeHtml).join(', ')} · ${entry.time}</p>
              </div>
              <p class="text-sm font-display text-gold text-right whitespace-nowrap">${entry.winner === 'Unentschieden' ? '🤝' : '🏆'} ${escapeHtml(entry.winner)}</p>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}

    ${stats.length > 0 ? `
      <button data-action="clear-stats" class="w-full h-11 mt-4 rounded-xl border-2 border-ink/15 text-sm font-medium text-ink/60 active:scale-95">
        🗑 Statistik löschen
      </button>
    ` : ''}
  `;
}

/* ---------- helpers ---------- */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function attemptJoin(code) {
  const myToken = ++sessionOpToken;

  if (typeof window.fbJoinSession !== 'function' || !window.fbConfigured) {
    state.deviceMode = 'multi';
    state.screen = 'join-code';
    state.prefillJoinCode = code;
    render();
    const errorEl = document.getElementById('join-error');
    if (errorEl) {
      errorEl.textContent = 'Verbindung nicht verfügbar (Firebase noch nicht eingerichtet).';
      errorEl.classList.remove('hidden');
    }
    return;
  }

  state.sessionCode = code;
  state.isHost = false;
  state.isSpectator = true;
  state.joinTimedOut = false;
  state._receivedAnyData = false;
  state.deviceMode = 'multi';
  state.screen = 'spectator-waiting';
  saveLocalSession(code, 'spectator');
  render();

  setTimeout(() => {
    if (myToken !== sessionOpToken) return; // überholt durch neuere Auswahl
    if (state.screen === 'spectator-waiting' && !state._receivedAnyData) {
      state.joinTimedOut = true;
      render();
    }
  }, 6000);

  window.fbJoinSession(code, (data) => {
    if (myToken !== sessionOpToken) return; // überholt durch neuere Auswahl
    if (!data) return;
    state._receivedAnyData = true;
    Object.assign(state, data);
    state.isHost = false;
    state.isSpectator = true;
    state.sessionCode = code;
    state.deviceMode = 'multi';
    state.joinTimedOut = false;
    saveLocalSession(code, 'spectator');
    const liveScreens = ['game-tree', 'game-points', 'game-lotto', 'game-null'];
    if (!liveScreens.includes(state.screen)) {
      state.screen = 'spectator-waiting';
    }
    render();
  });
}

function resetToStart() {
  if (typeof window.fbLeaveSession === 'function') {
    try { window.fbLeaveSession(); } catch (e) {}
  }
  state.screen = 'device-mode';
  state.deviceMode = null;
  state.isHost = false;
  state.isSpectator = false;
  state.sessionCode = null;
  state.joinTimedOut = false;
  state._receivedAnyData = false;
  state.editingUserId = null;
  state.userPickerForIndex = null;
  state.numPlayers = 2;
  state.mode = null;
  state.playerNames = defaultNames(2);
  state.numArrows = 3;
  state.numRoundsPoints = 3;
  state.numRoundsLotto = 3;
  state.lottoArrowsPerRound = 3;
  state.pausedPlayers = [];
  state.trees = [];
  state.active = 0;
  state.history = [];
  state.treeFinishOrder = [];
  state.pointsScores = [];
  state.pointsRound = 0;
  state.picker = null;
  state.pointsHistory = [];
  state.lottoVariant = 'club';
  state.lottoCalls = [];
  state.lottoScores = [];
  state.lottoRound = 0;
  state.lottoHistory = [];
  state.nullStartScore = 401;
  state.nullArrowsPerTurn = 3;
  state.nullScores = [];
  state.nullArrowsUsed = [];
  state.nullActive = 0;
  state.nullTurnArrows = [];
  state.nullFinishOrder = [];
  state.nullHistory = [];
  state.nullBustMessage = null;
  state.tiebreak = null;
  state.treeStatsRecorded = false;
  state.pointsStatsRecorded = false;
  state.lottoStatsRecorded = false;
  state.nullStatsRecorded = false;
}

/* ---------- events ---------- */
document.getElementById('app').addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  // Zuschauer dürfen nur den Spielstand ansehen, nicht verändern.
  // Alles, was nicht das eigentliche Spiel manipuliert (Navigation, Sessions-Verwaltung, Statistik ansehen etc.),
  // bleibt für Zuschauer immer erlaubt.
  const SPECTATOR_BLOCKED_ACTIONS = [
    'hit-cell', 'undo', 'reset', 'select-player',
    'open-picker', 'close-picker', 'pick-score', 'undo-points', 'reset-points', 'select-round',
    'draw-lotto', 'pick-lotto-hits', 'undo-lotto', 'reset-lotto', 'select-lotto-round',
    'pick-null-arrow', 'undo-null', 'reset-null',
    'tiebreak-answer-points', 'tiebreak-answer-lotto',
    'toggle-pause', 'switch-game',
    'select-lotto-variant', 'select-null-start', 'start-game', 'pick-mode',
  ];
  if (state.isSpectator && SPECTATOR_BLOCKED_ACTIONS.includes(action)) return;

  if (action === 'choose-single') {
    if (typeof window.fbLeaveSession === 'function') {
      try { window.fbLeaveSession(); } catch (e) {}
    }
    state.isHost = false;
    state.isSpectator = false;
    state.sessionCode = null;
    state.deviceMode = 'single';
    state.screen = 'player-count';
    render();
  }
  if (action === 'choose-multi') {
    if (typeof window.fbLeaveSession === 'function') {
      try { window.fbLeaveSession(); } catch (e) {}
    }
    state.isHost = false;
    state.isSpectator = false;
    state.sessionCode = null;
    state.deviceMode = 'multi';
    state.screen = 'multi-choice';
    render();
  }
  if (action === 'locked-multi') {
    // Ruft die native App auf, um die Paywall (Multi-Device-Upgrade) anzuzeigen.
    // Im normalen Web-Browser (z.B. GitHub Pages) passiert hier einfach nichts.
    window.location.href = 'archeryarena://upgrade';
  }
  if (action === 'back-to-device-mode') {
    if (typeof window.fbLeaveSession === 'function') {
      try { window.fbLeaveSession(); } catch (e) {}
    }
    state.isHost = false;
    state.isSpectator = false;
    state.sessionCode = null;
    state.deviceMode = null;
    state.editingUserId = null;
    state.screen = 'device-mode';
    render();
  }

  /* --- Nutzerverwaltung --- */
  if (action === 'go-user-management') {
    state.screen = 'user-management';
    render();
  }
  if (action === 'new-user') {
    state.editingUserId = null;
    state.screen = 'user-edit';
    render();
  }
  if (action === 'edit-user') {
    state.editingUserId = target.dataset.userId;
    state.screen = 'user-edit';
    render();
  }
  if (action === 'cancel-user-edit') {
    state.editingUserId = null;
    state.screen = 'user-management';
    render();
  }
  if (action === 'save-user') {
    const firstName = document.getElementById('user-firstname-input').value.trim();
    const lastName = document.getElementById('user-lastname-input').value.trim();
    const nickname = document.getElementById('user-nickname-input').value.trim();
    if (!firstName && !lastName && !nickname) return;
    const profiles = loadUserProfiles();
    if (state.editingUserId) {
      const idx = profiles.findIndex(p => p.id === state.editingUserId);
      if (idx !== -1) profiles[idx] = { ...profiles[idx], firstName, lastName, nickname };
    } else {
      profiles.push({ id: 'u' + Date.now() + Math.floor(Math.random() * 1000), firstName, lastName, nickname });
    }
    saveUserProfiles(profiles);
    state.editingUserId = null;
    state.screen = 'user-management';
    render();
  }
  if (action === 'delete-user') {
    const userId = target.dataset.userId;
    if (confirm('Diesen Nutzer wirklich löschen?')) {
      const profiles = loadUserProfiles().filter(p => p.id !== userId);
      saveUserProfiles(profiles);
      state.editingUserId = null;
      state.screen = 'user-management';
      render();
    }
  }
  if (action === 'open-user-picker') {
    syncPlayerNamesFromInputs();
    state.userPickerForIndex = parseInt(target.dataset.idx, 10);
    render();
  }
  if (action === 'close-user-picker') {
    state.userPickerForIndex = null;
    render();
  }
  if (action === 'pick-user-for-slot') {
    syncPlayerNamesFromInputs();
    const idx = parseInt(target.dataset.idx, 10);
    const userId = target.dataset.userId;
    const profile = loadUserProfiles().find(p => p.id === userId);
    if (profile) {
      state.playerNames[idx] = profile.nickname || (profile.firstName + ' ' + profile.lastName) || `Spieler ${idx + 1}`;
    }
    state.userPickerForIndex = null;
    render();
  }

  if (action === 'back-to-multi-choice') {
    if (typeof window.fbLeaveSession === 'function') {
      try { window.fbLeaveSession(); } catch (e) {}
    }
    state.isHost = false;
    state.isSpectator = false;
    state.sessionCode = null;
    state.joinTimedOut = false;
    state.screen = 'multi-choice';
    render();
  }
  if (action === 'resume-session') {
    if (resumingCode) return;
    const code = target.dataset.code;
    const role = target.dataset.role;
    if (role === 'host') {
      resumeAsHost(code);
    } else {
      attemptJoin(code);
    }
  }
  if (action === 'go-sessions-list') {
    state.screen = 'sessions-list';
    render();
  }
  if (action === 'remove-session') {
    if (resumingCode) return;
    removeLocalSession(target.dataset.code);
    render();
  }
  if (action === 'host-session') {
    state.isHost = true;
    state.isSpectator = false;
    state.sessionCode = String(1000 + Math.floor(Math.random() * 9000));
    state.screen = 'host-code';
    saveLocalSession(state.sessionCode, 'host');
    render();
  }
  if (action === 'continue-after-host') {
    state.screen = 'player-count';
    render();
  }
  if (action === 'show-join-screen') {
    state.screen = 'join-code';
    render();
  }
  if (action === 'submit-join-code') {
    const input = document.getElementById('join-code-input');
    const code = (input.value || '').trim();
    const errorEl = document.getElementById('join-error');
    if (!/^\d{4}$/.test(code)) {
      errorEl.textContent = 'Bitte einen 4-stelligen Code eingeben.';
      errorEl.classList.remove('hidden');
      return;
    }
    attemptJoin(code);
  }
  if (action === 'leave-session') {
    if (typeof window.fbLeaveSession === 'function') {
      try { window.fbLeaveSession(); } catch (e) {}
    }
    resetToStart();
    render();
  }

  if (action === 'pick-count') {
    const n = parseInt(target.dataset.count, 10);
    state.numPlayers = n;
    state.playerNames = defaultNames(n);
    state.screen = 'mode';
    render();
  }
  if (action === 'back-to-count') {
    state.screen = 'player-count';
    render();
  }
  if (action === 'pick-mode') {
    state.mode = target.dataset.mode;
    state.screen = 'setup';
    render();
  }
  if (action === 'back-to-mode') {
    state.screen = 'mode';
    state.mode = null;
    render();
  }
  if (action === 'select-null-start') {
    syncPlayerNamesFromInputs();
    state.nullStartScore = parseInt(target.dataset.value, 10);
    render();
  }
  if (action === 'select-lotto-variant') {
    syncPlayerNamesFromInputs();
    state.lottoVariant = target.dataset.value;
    render();
  }

  if (action === 'start-game') {
    const inputs = document.querySelectorAll('[data-player-input]');
    inputs.forEach(inp => {
      const idx = parseInt(inp.dataset.playerInput, 10);
      const val = inp.value.trim();
      state.playerNames[idx] = val || `Spieler ${idx + 1}`;
    });
    state.pausedPlayers = [];
    state.tiebreak = null;

    if (state.mode === 'tree') {
      state.trees = Array.from({ length: state.numPlayers }, () => makeTree());
      state.active = 0;
      state.history = [];
      state.treeFinishOrder = [];
      state.treeStatsRecorded = false;
      state.screen = 'game-tree';
    } else if (state.mode === 'points') {
      const roundsInput = document.getElementById('num-points-rounds-input');
      let numPR = parseInt(roundsInput.value, 10);
      if (!numPR || numPR < MIN_POINTS_ROUNDS) numPR = MIN_POINTS_ROUNDS;
      if (numPR > MAX_POINTS_ROUNDS) numPR = MAX_POINTS_ROUNDS;
      state.numRoundsPoints = numPR;

      const numInput = document.getElementById('num-arrows-input');
      let numA = parseInt(numInput.value, 10);
      if (!numA || numA < MIN_POINTS_ARROWS) numA = MIN_POINTS_ARROWS;
      if (numA > MAX_POINTS_ARROWS) numA = MAX_POINTS_ARROWS;
      state.numArrows = numA;
      state.pointsScores = makePointsScores(state.numPlayers, numA, numPR);
      state.pointsRound = 0;
      state.picker = null;
      state.pointsHistory = [];
      state.pointsStatsRecorded = false;
      state.screen = 'game-points';
    } else if (state.mode === 'lotto') {
      const roundsInput = document.getElementById('num-rounds-input');
      let numR = parseInt(roundsInput.value, 10);
      if (!numR || numR < MIN_LOTTO_ROUNDS) numR = MIN_LOTTO_ROUNDS;
      if (numR > MAX_LOTTO_ROUNDS) numR = MAX_LOTTO_ROUNDS;
      state.numRoundsLotto = numR;

      const arrowsInput = document.getElementById('num-lotto-arrows-input');
      let numLA = parseInt(arrowsInput.value, 10);
      if (!numLA || numLA < MIN_LOTTO_ARROWS) numLA = MIN_LOTTO_ARROWS;
      if (numLA > MAX_LOTTO_ARROWS) numLA = MAX_LOTTO_ARROWS;
      state.lottoArrowsPerRound = numLA;

      const lotto = makeLottoState(state.numPlayers, numR);
      state.lottoCalls = lotto.calls;
      state.lottoScores = lotto.scores;
      state.lottoRound = 0;
      state.lottoHistory = [];
      state.lottoStatsRecorded = false;
      state.screen = 'game-lotto';
    } else if (state.mode === 'null') {
      const nullArrowsInput = document.getElementById('num-null-arrows-input');
      let numNA = parseInt(nullArrowsInput.value, 10);
      if (!numNA || numNA < MIN_NULL_ARROWS) numNA = MIN_NULL_ARROWS;
      if (numNA > MAX_NULL_ARROWS) numNA = MAX_NULL_ARROWS;
      state.nullArrowsPerTurn = numNA;
      state.nullScores = new Array(state.numPlayers).fill(state.nullStartScore);
      state.nullArrowsUsed = new Array(state.numPlayers).fill(0);
      state.nullActive = 0;
      state.nullTurnArrows = [];
      state.nullFinishOrder = [];
      state.nullHistory = [];
      state.nullBustMessage = null;
      state.nullStatsRecorded = false;
      state.screen = 'game-null';
    }
    render();
  }

  if (action === 'go-stats') {
    state.screen = 'stats';
    render();
  }
  if (action === 'back-to-mode-from-stats') {
    state.screen = 'mode';
    render();
  }
  if (action === 'clear-stats') {
    if (confirm('Gesamte Statistik der letzten 7 Tage löschen?')) {
      try { localStorage.removeItem(STATS_KEY); } catch (e) {}
      render();
    }
  }

  if (action === 'toggle-pause') {
    const p = parseInt(target.dataset.player, 10);
    const idx = state.pausedPlayers.indexOf(p);
    if (idx === -1) {
      state.pausedPlayers.push(p);
      if (state.mode === 'tree' && state.active === p) {
        const alt = activePlayerIndices()[0];
        if (alt !== undefined) state.active = alt;
      }
      if (state.mode === 'null' && state.nullActive === p && !state.nullFinishOrder.includes(p)) {
        state.nullActive = nextActiveNullPlayer(p);
      }
    } else {
      state.pausedPlayers.splice(idx, 1);
    }
    render();
  }

  if (action === 'go-home') {
    if (state.isSpectator) {
      if (typeof window.fbLeaveSession === 'function') {
        try { window.fbLeaveSession(); } catch (e) {}
      }
      resetToStart();
      render();
    } else if (confirm('Zurück zum Start? Der aktuelle Fortschritt geht verloren.')) {
      resetToStart();
      render();
    }
  }

  if (action === 'switch-game') {
    if (confirm('Zurück zum Spielmenü? Der Fortschritt in diesem Spiel geht verloren – Namen und Spieleranzahl bleiben erhalten.')) {
      state.mode = null;
      state.screen = 'mode';
      state.tiebreak = null;
      render();
    }
  }

  /* --- tree actions --- */
  if (action === 'select-player') {
    state.active = parseInt(target.dataset.player, 10);
    render();
    const card = document.getElementById('tree-card-' + state.active);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
  if (action === 'hit-cell') {
    const p = parseInt(target.dataset.player, 10);
    const r = parseInt(target.dataset.row, 10);
    const col = parseInt(target.dataset.col, 10);
    if (state.trees[p][r][col] === true) return;
    state.trees[p][r][col] = true;
    state.history.push({ p, r, col });
    if (isTreeComplete(state.trees[p]) && !state.treeFinishOrder.includes(p)) {
      state.treeFinishOrder.push(p);
      if (!state.treeStatsRecorded) {
        recordGameResult('tree', state.playerNames[state.treeFinishOrder[0]]);
        state.treeStatsRecorded = true;
      }
    }
    render();
  }
  if (action === 'undo') {
    const last = state.history.pop();
    if (last) {
      state.trees[last.p][last.r][last.col] = false;
      state.treeFinishOrder = state.treeFinishOrder.filter(pl => isTreeComplete(state.trees[pl]));
      render();
    }
  }
  if (action === 'reset') {
    if (confirm('Spiel wirklich zurücksetzen? Alle Treffer gehen verloren.')) {
      state.trees = Array.from({ length: state.numPlayers }, () => makeTree());
      state.history = [];
      state.active = 0;
      state.treeFinishOrder = [];
      state.treeStatsRecorded = false;
      render();
    }
  }

  /* --- points actions --- */
  if (action === 'select-round') {
    state.pointsRound = parseInt(target.dataset.round, 10);
    state.picker = null;
    render();
  }
  if (action === 'open-picker') {
    const p = parseInt(target.dataset.player, 10);
    const round = parseInt(target.dataset.round, 10);
    const idx = parseInt(target.dataset.idx, 10);
    if (state.picker && state.picker.player === p && state.picker.round === round && state.picker.idx === idx) {
      state.picker = null;
    } else {
      state.picker = { player: p, round, idx };
    }
    render();
  }
  if (action === 'close-picker') {
    state.picker = null;
    render();
  }
  if (action === 'pick-score') {
    const p = parseInt(target.dataset.player, 10);
    const round = parseInt(target.dataset.round, 10);
    const idx = parseInt(target.dataset.idx, 10);
    const value = parseInt(target.dataset.value, 10);
    const prevValue = state.pointsScores[p][round][idx];
    state.pointsScores[p][round][idx] = value;
    state.pointsHistory.push({ p, round, idx, prevValue });

    const arr = state.pointsScores[p][round];
    const nextIdx = arr.findIndex((v, i) => i > idx && v === null);
    state.picker = nextIdx !== -1 ? { player: p, round, idx: nextIdx } : null;
    render();
  }
  if (action === 'undo-points') {
    const last = state.pointsHistory.pop();
    if (last) {
      state.pointsScores[last.p][last.round][last.idx] = last.prevValue;
      state.picker = { player: last.p, round: last.round, idx: last.idx };
      render();
    }
  }
  if (action === 'reset-points') {
    if (confirm('Spiel wirklich zurücksetzen? Alle Punkte gehen verloren.')) {
      state.pointsScores = makePointsScores(state.numPlayers, state.numArrows, state.numRoundsPoints);
      state.pointsRound = 0;
      state.picker = null;
      state.pointsHistory = [];
      state.pointsStatsRecorded = false;
      state.tiebreak = null;
      render();
    }
  }

  /* --- lotto actions --- */
  if (action === 'select-lotto-round') {
    state.lottoRound = parseInt(target.dataset.round, 10);
    render();
  }
  if (action === 'draw-lotto') {
    const round = parseInt(target.dataset.round, 10);
    state.lottoCalls[round] = drawLottoCall(state.lottoVariant, state.lottoArrowsPerRound);
    render();
  }
  if (action === 'pick-lotto-hits') {
    const p = parseInt(target.dataset.player, 10);
    const round = parseInt(target.dataset.round, 10);
    const hits = parseInt(target.dataset.hits, 10);
    const prevHits = state.lottoScores[p][round];
    state.lottoScores[p][round] = (prevHits === hits) ? null : hits;
    state.lottoHistory.push({ p, round, prevHits });
    render();
  }
  if (action === 'undo-lotto') {
    const last = state.lottoHistory.pop();
    if (last) {
      state.lottoScores[last.p][last.round] = last.prevHits;
      render();
    }
  }
  if (action === 'reset-lotto') {
    if (confirm('Spiel wirklich zurücksetzen? Alle Zahlen und Punkte gehen verloren.')) {
      const lotto = makeLottoState(state.numPlayers, state.numRoundsLotto);
      state.lottoCalls = lotto.calls;
      state.lottoScores = lotto.scores;
      state.lottoRound = 0;
      state.lottoHistory = [];
      state.lottoStatsRecorded = false;
      state.tiebreak = null;
      render();
    }
  }

  /* --- Stechen (Tiebreak) actions --- */
  if (action === 'tiebreak-answer-points') {
    const p = parseInt(target.dataset.player, 10);
    const value = parseInt(target.dataset.value, 10);
    state.tiebreak.answers[p] = value;
    evaluateTiebreakAttempt();
    render();
  }
  if (action === 'tiebreak-answer-lotto') {
    const p = parseInt(target.dataset.player, 10);
    const hit = target.dataset.hit === '1';
    state.tiebreak.answers[p] = hit;
    evaluateTiebreakAttempt();
    render();
  }

  /* --- nullschuss actions --- */
  if (action === 'pick-null-arrow') {
    if (state.nullFinishOrder.includes(state.nullActive)) return;
    state.nullBustMessage = null;
    const value = parseInt(target.dataset.value, 10);

    state.nullHistory.push(JSON.parse(JSON.stringify({
      scores: state.nullScores,
      active: state.nullActive,
      turnArrows: state.nullTurnArrows,
      finishOrder: state.nullFinishOrder,
      arrowsUsed: state.nullArrowsUsed,
    })));

    const p = state.nullActive;
    state.nullTurnArrows.push(value);
    state.nullArrowsUsed[p] = (state.nullArrowsUsed[p] || 0) + 1;
    const running = state.nullScores[p] - state.nullTurnArrows.reduce((s, v) => s + v, 0);

    if (running < 0) {
      state.nullBustMessage = { player: p };
      state.nullTurnArrows = [];
      state.nullActive = nextActiveNullPlayer(p);
    } else if (running === 0) {
      state.nullScores[p] = 0;
      state.nullTurnArrows = [];
      if (!state.nullFinishOrder.includes(p)) state.nullFinishOrder.push(p);
      const allActiveDone = activePlayerIndices().every(pl => state.nullFinishOrder.includes(pl));
      if (allActiveDone) {
        if (!state.nullStatsRecorded) {
          const ranked = [...state.nullFinishOrder].sort((a, b) => state.nullArrowsUsed[a] - state.nullArrowsUsed[b]);
          recordGameResult('null', state.playerNames[ranked[0]]);
          state.nullStatsRecorded = true;
        }
      } else {
        state.nullActive = nextActiveNullPlayer(p);
      }
    } else if (state.nullTurnArrows.length === state.nullArrowsPerTurn) {
      state.nullScores[p] = running;
      state.nullTurnArrows = [];
      state.nullActive = nextActiveNullPlayer(p);
    }
    render();
  }
  if (action === 'undo-null') {
    const last = state.nullHistory.pop();
    if (last) {
      state.nullScores = last.scores;
      state.nullActive = last.active;
      state.nullTurnArrows = last.turnArrows;
      state.nullFinishOrder = last.finishOrder;
      state.nullArrowsUsed = last.arrowsUsed;
      state.nullBustMessage = null;
      render();
    }
  }
  if (action === 'reset-null') {
    if (confirm('Spiel wirklich zurücksetzen? Alle Punktestände gehen verloren.')) {
      state.nullScores = new Array(state.numPlayers).fill(state.nullStartScore);
      state.nullArrowsUsed = new Array(state.numPlayers).fill(0);
      state.nullActive = 0;
      state.nullTurnArrows = [];
      state.nullFinishOrder = [];
      state.nullHistory = [];
      state.nullBustMessage = null;
      state.nullStatsRecorded = false;
      render();
    }
  }
});

// Abo-Status: wird von der iOS-App per URL-Parameter übergeben ('single' oder 'multi').
// Ohne Parameter (z.B. normale Web-Nutzung) bleibt alles freigeschaltet.
const urlEntitlement = new URLSearchParams(window.location.search).get('entitlement');
if (urlEntitlement === 'single' || urlEntitlement === 'multi') {
  state.entitlement = urlEntitlement;
}

// Wird von der nativen iOS-App aufgerufen, wenn sich der Abo-Status ändert
// (z.B. nach einem Upgrade-Kauf), ohne die laufende Partie neu zu laden.
window.updateEntitlement = function (newEntitlement) {
  if (newEntitlement !== 'single' && newEntitlement !== 'multi') return;
  state.entitlement = newEntitlement;
  render();
};

const urlCode = new URLSearchParams(window.location.search).get('code');
if (urlCode && /^\d{4}$/.test(urlCode)) {
  attemptJoin(urlCode);
} else {
  render();
}
</script>
</body>
</html>
